<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Plans</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --card-border: #2a2a4a;
    --text: #e0e0f0;
    --text-muted: #8888aa;
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --glow: rgba(108, 99, 255, 0.25);
    --badge-bg: #6c63ff;
    --success: #4ade80;
    --radius: 16px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --price-transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .pricing-container {
    max-width: 1100px;
    width: 100%;
    text-align: center;
  }

  .pricing-container h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .pricing-container > p {
    color: var(--text-muted);
    margin-bottom: 32px;
    font-size: 1.05rem;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 48px;
  }

  .toggle-wrap span {
    font-size: 0.95rem;
    color: var(--text-muted);
    transition: color var(--transition);
    user-select: none;
  }

  .toggle-wrap span.active {
    color: #fff;
    font-weight: 600;
  }

  .toggle-switch {
    position: relative;
    width: 52px;
    height: 28px;
    background: var(--card-border);
    border-radius: 14px;
    cursor: pointer;
    transition: background var(--transition);
    flex-shrink: 0;
  }

  .toggle-switch:hover {
    background: #3a3a5a;
  }

  .toggle-switch .knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 50%;
    transition: transform var(--transition);
  }

  .toggle-switch.annual .knob {
    transform: translateX(24px);
  }

  /* Pricing Grid */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    align-items: stretch;
  }

  /* Card */
  .pricing-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    position: relative;
    transition: transform var(--transition), box-shadow var(--transition);
    display: flex;
    flex-direction: column;
  }

  .pricing-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 40px var(--glow);
    border-color: var(--accent);
  }

  /* Badge */
  .badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--badge-bg);
    color: #fff;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 5px 18px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .card-header {
    margin-bottom: 24px;
  }

  .card-header h2 {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 2px;
  }

  .price-row .currency {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
  }

  .price-row .amount {
    font-size: 3rem;
    font-weight: 800;
    color: #fff;
    transition: opacity var(--price-transition), transform var(--price-transition);
    display: inline-block;
  }

  .price-row .amount.updating {
    opacity: 0;
    transform: translateY(-6px) scale(0.95);
  }

  .price-row .period {
    font-size: 1rem;
    color: var(--text-muted);
    margin-left: 4px;
  }

  .card-header .annual-note {
    font-size: 0.8rem;
    color: var(--success);
    margin-top: 4px;
    opacity: 0;
    transition: opacity var(--transition);
    min-height: 1.2em;
  }

  .card-header .annual-note.visible {
    opacity: 1;
  }

  /* Features */
  .card-features {
    list-style: none;
    margin: 24px 0 32px;
    flex: 1;
    text-align: left;
  }

  .card-features li {
    padding: 8px 0;
    font-size: 0.92rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-features li::before {
    content: '✓';
    color: var(--success);
    font-weight: 700;
    font-size: 0.85rem;
  }

  /* Button */
  .card-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px 0;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: background var(--transition), transform var(--transition);
  }

  .card-btn:hover {
    background: var(--accent-hover);
    transform: scale(1.02);
  }

  .card-btn:active {
    transform: scale(0.98);
  }

  .pricing-card.pro .card-btn {
    background: var(--badge-bg);
  }

  .pricing-card.pro .card-btn:hover {
    background: var(--accent-hover);
  }

  .pricing-card.free .card-btn {
    background: transparent;
    border: 2px solid var(--card-border);
  }

  .pricing-card.free .card-btn:hover {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.08);
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  /* Pro featured card */
  .pricing-card.pro {
    border-color: var(--accent);
    transform: scale(1.03);
    z-index: 1;
  }

  .pricing-card.pro:hover {
    transform: translateY(-8px) scale(1.03);
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 16px; }
    .pricing-grid {
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .pricing-card.pro {
      transform: none;
    }
    .pricing-card.pro:hover {
      transform: translateY(-8px);
    }
    .pricing-container h1 {
      font-size: 1.6rem;
    }
    .price-row .amount {
      font-size: 2.4rem;
    }
  }
</style>
</head>
<body>
<div class="pricing-container">
  <h1>Choose Your Plan</h1>
  <p>Pick the right plan for your needs</p>

  <div class="toggle-wrap">
    <span id="label-monthly" class="active">Monthly</span>
    <div class="toggle-switch" id="toggle-switch" role="button" tabindex="0" aria-label="Toggle pricing">
      <div class="knob"></div>
    </div>
    <span id="label-annual">Annual</span>
  </div>

  <div class="pricing-grid" id="pricing-grid"></div>
</div>

<script>
  (function() {
    'use strict';

    const plans = [
      {
        name: 'Free',
        monthly: 0,
        annual: 0,
        features: ['Up to 3 projects', 'Basic analytics', 'Community support', '1 GB storage'],
        cta: 'Get Started',
        featured: false,
      },
      {
        name: 'Pro',
        monthly: 19,
        annual: 15.20,
        features: ['Unlimited projects', 'Advanced analytics', 'Priority support', '50 GB storage', 'Custom integrations'],
        cta: 'Subscribe',
        featured: true,
      },
      {
        name: 'Enterprise',
        monthly: 99,
        annual: 79.20,
        features: ['Everything in Pro', 'Dedicated manager', '24/7 phone support', 'Unlimited storage', 'SLA guarantee'],
        cta: 'Contact Us',
        featured: false,
      },
    ];

    let isAnnual = false;
    const grid = document.getElementById('pricing-grid');
    const toggle = document.getElementById('toggle-switch');
    const labelM = document.getElementById('label-monthly');
    const labelA = document.getElementById('label-annual');

    function renderCards() {
      grid.innerHTML = '';
      plans.forEach((plan, idx) => {
        const card = document.createElement('div');
        card.className = `pricing-card ${plan.name.toLowerCase()}`;

        if (plan.featured) {
          const badge = document.createElement('div');
          badge.className = 'badge';
          badge.textContent = 'Most Popular';
          card.appendChild(badge);
        }

        const header = document.createElement('div');
        header.className = 'card-header';

        const h2 = document.createElement('h2');
        h2.textContent = plan.name;
        header.appendChild(h2);

        const priceRow = document.createElement('div');
        priceRow.className = 'price-row';

        const currency = document.createElement('span');
        currency.className = 'currency';
        currency.textContent = plan.monthly > 0 ? '$' : '';
        priceRow.appendChild(currency);

        const amount = document.createElement('span');
        amount.className = 'amount';
        amount.dataset.monthly = plan.monthly;
        amount.dataset.annual = plan.annual;
        amount.textContent = plan.monthly > 0 ? plan.monthly : '0';
        priceRow.appendChild(amount);

        const period = document.createElement('span');
        period.className = 'period';
        period.textContent = plan.monthly > 0 ? '/mo' : '';
        priceRow.appendChild(period);

        header.appendChild(priceRow);

        const note = document.createElement('div');
        note.className = 'annual-note';
        note.textContent = isAnnual ? 'Billed annually' : '';
        if (isAnnual) note.classList.add('visible');
        header.appendChild(note);

        card.appendChild(header);

        const ul = document.createElement('ul');
        ul.className = 'card-features';
        plan.features.forEach(f => {
          const li = document.createElement('li');
          li.textContent = f;
          ul.appendChild(li);
        });
        card.appendChild(ul);

        const btn = document.createElement('button');
        btn.className = 'card-btn';
        btn.textContent = plan.cta;
        btn.addEventListener('click', function(e) {
          ripple(e, this);
        });
        card.appendChild(btn);

        grid.appendChild(card);
      });
    }

    function updatePrices(animate) {
      const amounts = document.querySelectorAll('.amount');
      const notes = document.querySelectorAll('.annual-note');

      if (animate) {
        amounts.forEach(el => el.classList.add('updating'));
      }

      setTimeout(() => {
        amounts.forEach(el => {
          const val = isAnnual ? parseFloat(el.dataset.annual) : parseInt(el.dataset.monthly, 10);
          el.textContent = val > 0 && val % 1 !== 0 ? val.toFixed(2) : (val > 0 ? val : '0');
          if (animate) el.classList.remove('updating');
        });

        notes.forEach((note, i) => {
          if (isAnnual) {
            note.textContent = 'Billed annually';
            note.classList.add('visible');
          } else {
            note.textContent = '';
            note.classList.remove('visible');
          }
        });
      }, animate ? 200 : 0);
    }

    function togglePricing() {
      isAnnual = !isAnnual;
      toggle.classList.toggle('annual', isAnnual);
      labelM.classList.toggle('active', !isAnnual);
      labelA.classList.toggle('active', isAnnual);
      updatePrices(true);
    }

    toggle.addEventListener('click', togglePricing);
    toggle.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        togglePricing();
      }
    });

    function ripple(e, btn) {
      const rect = btn.getBoundingClientRect();
      const r = document.createElement('span');
      r.className = 'ripple';
      const size = Math.max(rect.width, rect.height) * 2;
      r.style.width = r.style.height = size + 'px';
      r.style.left = (e.clientX - rect.left - size / 2) + 'px';
      r.style.top = (e.clientY - rect.top - size / 2) + 'px';
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    renderCards();
    updatePrices(false);
  })();
</script>
</body>
</html>
